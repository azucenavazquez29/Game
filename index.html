<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hangman Team Challenge - First Word Hint</title>
  <style>
    :root {
      --primary-blue: #2980b9;
      --primary-green: #2ecc71;
      --white: #ffffff;
      --yellow: #f1c40f;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, var(--primary-blue), var(--primary-green));
      color: var(--white);
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .game-container {
      background-color: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(12px);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      border: 2px solid var(--white);
      width: 95%;
      max-width: 800px;
    }

    .header-info {
      display: flex;
      justify-content: space-around;
      margin-bottom: 15px;
      font-weight: bold;
      font-size: 1.3rem;
    }

    #timer {
      background: #e74c3c;
      padding: 5px 15px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    #hangman-svg {
      width: 140px;
      height: 140px;
      fill: none;
      stroke: var(--white);
      stroke-width: 4;
      stroke-linecap: round;
      margin: 10px auto;
    }

    .draw-part { display: none; }

    #word {
      font-size: 26px;
      letter-spacing: 4px;
      margin: 25px 0;
      font-weight: bold;
      text-transform: uppercase;
      background: rgba(0,0,0,0.1);
      padding: 15px;
      border-radius: 10px;
    }

    .input-area {
      margin: 20px 0;
    }

    input {
      padding: 12px;
      font-size: 22px;
      border: none;
      border-radius: 8px;
      width: 60px;
      text-align: center;
      outline: none;
      color: var(--primary-blue);
      font-weight: bold;
    }

    button {
      padding: 12px 25px;
      font-size: 18px;
      margin: 5px;
      background-color: var(--white);
      color: var(--primary-blue);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    button:hover {
      background-color: var(--yellow);
      transform: translateY(-2px);
    }

    #message {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
      min-height: 40px;
    }

    .win-text { color: var(--yellow); animation: bounce 0.5s infinite alternate; }
    @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
  </style>
</head>
<body>

  <div class="game-container">
    <h1>Team English Battle</h1>
    
    <div class="header-info">
      <div>Time: <span id="timer">05:00</span></div>
      <div>Mistakes: <span id="attempts">0</span>/6</div>
    </div>

    <svg id="hangman-svg" viewBox="0 0 100 100">
      <path d="M20 90 L80 90 M30 90 L30 10 L60 10 L60 20" />
      <circle id="head" class="draw-part" cx="60" cy="30" r="10" />
      <line id="body-line" class="draw-part" x1="60" y1="40" x2="60" y2="70" />
      <line id="arm-l" class="draw-part" x1="60" y1="50" x2="45" y2="60" />
      <line id="arm-r" class="draw-part" x1="60" y1="50" x2="75" y2="60" />
      <line id="leg-l" class="draw-part" x1="60" y1="70" x2="45" y2="85" />
      <line id="leg-r" class="draw-part" x1="60" y1="70" x2="75" y2="85" />
    </svg>

    <p id="word"></p>
    
    <div class="input-area">
      <input type="text" id="letter" maxlength="1" placeholder="?" autocomplete="off">
      <button onclick="guess()">GUESS</button>
      <button onclick="nextTeam()" style="background-color: #2c3e50; color: white;">NEXT TEAM</button>
    </div>

    <div id="message"></div>
  </div>

  <script>
    const phrases = [
      "IF YOU TOUCH FIRE IT BURNS",
      "I HAVE EATEN PIZZA TODAY",
      "THE HEART PUMPS BLOOD",
      "SHE HAS VISITED LONDON",
      "WATER BOILS AT ONE HUNDRED DEGREES",
      "MY KNEE HURTS SINCE YESTERDAY"
    ];

    let phrase, hidden, mistakes, timeLeft, timerInterval;
    const bodyParts = ["head", "body-line", "arm-l", "arm-r", "leg-l", "leg-r"];

    function initGame() {
      // 1. Seleccionar frase
      phrase = phrases[Math.floor(Math.random() * phrases.length)];
      let words = phrase.split(" ");
      let firstWord = words[0];

      // 2. Crear versión oculta pero REVELANDO la primera palabra
      hidden = phrase.split("").map((ch, index) => {
        if (ch === " ") return " ";
        // Si el índice es menor a la longitud de la primera palabra, la mostramos
        return index < firstWord.length ? ch : "_";
      });

      mistakes = 0;
      timeLeft = 300; 
      
      // Reset UI
      document.getElementById("message").textContent = "";
      document.getElementById("message").className = "";
      document.querySelectorAll(".draw-part").forEach(p => p.style.display = "none");
      
      clearInterval(timerInterval);
      startTimer();
      updateUI();
    }

    function startTimer() {
      timerInterval = setInterval(() => {
        let mins = Math.floor(timeLeft / 60);
        let secs = timeLeft % 60;
        document.getElementById("timer").textContent = 
          `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        
        if (timeLeft <= 0) {
          endGame("TIME'S UP!");
        }
        timeLeft--;
      }, 1000);
    }

    function updateUI() {
      document.getElementById("word").textContent = hidden.join("");
      document.getElementById("attempts").textContent = mistakes;
    }

    function guess() {
      const inputEl = document.getElementById("letter");
      const char = inputEl.value.toUpperCase();
      inputEl.value = "";
      inputEl.focus();

      if (!char.match(/[A-Z]/) || char === "" || mistakes >= 6) return;

      if (phrase.includes(char)) {
        phrase.split("").forEach((c, i) => {
          if (c === char) hidden[i] = char;
        });
      } else {
        if (bodyParts[mistakes]) {
          document.getElementById(bodyParts[mistakes]).style.display = "block";
        }
        mistakes++;
      }

      updateUI();
      checkStatus();
    }

    function checkStatus() {
      if (!hidden.includes("_")) {
        clearInterval(timerInterval);
        document.getElementById("message").textContent = "✨ EXCELLENT! TEAM VICTORY! ✨";
        document.getElementById("message").className = "win-text";
      } else if (mistakes >= 6) {
        endGame("GAME OVER!");
      }
    }

    function endGame(msg) {
      clearInterval(timerInterval);
      document.getElementById("message").textContent = `${msg} Phrase: ${phrase}`;
    }

    function nextTeam() {
      initGame();
    }

    document.getElementById("letter").addEventListener("keypress", (e) => {
      if (e.key === "Enter") guess();
    });

    initGame();
  </script>
</body>
</html>
